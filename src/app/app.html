<div class="layout">
  <aside class="sidebar">
    <div>
      <h1>Insight Board</h1>
      <p>{{ text.role }}</p>
    </div>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">{{ text.nav.dashboard }}</a>
      <a routerLink="/analytics" routerLinkActive="active">{{ text.nav.analytics }}</a>
      <a routerLink="/reports" routerLinkActive="active">{{ text.nav.reports }}</a>
      <a routerLink="/settings" routerLinkActive="active">{{ text.nav.settings }}</a>
    </nav>

    <div class="language-switch" role="group" aria-label="language selector">
      <button type="button" [class.active]="language === 'es'" (click)="setLanguage('es')">ES</button>
      <button type="button" [class.active]="language === 'en'" (click)="setLanguage('en')">EN</button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
