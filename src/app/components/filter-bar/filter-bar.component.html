<section class="filter-bar">
  <label>
    {{ labels.category }}
    <select [ngModel]="filter.category" (ngModelChange)="update('category', $event)">
      @for (category of categories; track category) {
      <option [value]="category">{{ categoryLabels[category] }}</option>
      }
    </select>
  </label>

  <label>
    {{ labels.status }}
    <select [ngModel]="filter.status" (ngModelChange)="update('status', $event)">
      @for (status of statuses; track status) {
      <option [value]="status">{{ statusLabels[status] }}</option>
      }
    </select>
  </label>

  <label>
    {{ labels.searchCustomer }}
    <input
      type="text"
      [ngModel]="filter.search"
      (ngModelChange)="update('search', $event)"
      [placeholder]="labels.searchPlaceholder"
    />
  </label>

  <label>
    {{ labels.dateFrom }}
    <input type="date" [ngModel]="filter.dateFrom" (ngModelChange)="update('dateFrom', $event)" />
  </label>

  <label>
    {{ labels.dateTo }}
    <input type="date" [ngModel]="filter.dateTo" (ngModelChange)="update('dateTo', $event)" />
  </label>

  <button type="button" class="ghost" (click)="clearFilters.emit()">{{ labels.clear }}</button>
</section>
